[project]
site_name = "E-asy · Gestor de flujo de trabajo"
site_description = "Documentación del sistema de gestión de proyectos y tareas E-asy."
site_author = "Equipo E-asy"
copyright = "Copyright &copy; 2026 E-asy"

nav = [
  { "Inicio" = "index.md" },
  { "Instalación" = "instalacion.md" },
  { "Proyectos" = "proyectos.md" },
  { "Tareas" = "tareas.md" },
  { "Sprints" = "sprints.md" },
  { "Roadmap" = "roadmap.md" },
  { "Horas" = "horas.md" },
  { "Analítica" = "analitica.md" },
  { "Atajos de teclado" = "atajos.md" },
  { "API REST" = "api.md" },
]

[project.theme]
language = "es"
variant = "classic"
favicon = "easy_icono.png"

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Cambiar a modo oscuro"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "blue"
toggle.icon = "lucide/moon"
toggle.name = "Cambiar a modo claro"
