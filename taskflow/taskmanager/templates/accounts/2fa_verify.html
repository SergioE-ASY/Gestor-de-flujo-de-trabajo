{% extends 'base/base.html' %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div style="display:inline-flex;align-items:center;gap:10px;">
        <div style="width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;color:white;">T</div>
        <h1>Task<span>Flow</span></h1>
      </div>
    </div>
    <div class="auth-card">
      <div class="auth-title">Verificación en dos pasos</div>
      <div class="auth-subtitle">Introduce el código de tu app de autenticación</div>

      {% if error %}
      <div class="messages"><div class="message message-error">{{ error }}</div></div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Código de verificación</label>
          <input type="text" name="token" inputmode="numeric" maxlength="6" autocomplete="one-time-code"
            class="form-control" placeholder="123456" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
          Verificar
        </button>
      </form>
    </div>
    <div class="auth-footer">
      <a href="{% url 'login' %}">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
{% endblock %}
