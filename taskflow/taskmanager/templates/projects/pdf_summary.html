<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Resumen Ejecutivo - {{ project.name }}</title>
<style>
    @page {
        size: A4;
        margin: 2cm;
        @frame footer {
            -pdf-frame-content: footerContent;
            bottom: 0cm;
            margin-left: 1cm;
            margin-right: 1cm;
            height: 1cm;
        }
    }
    body {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 11pt;
        line-height: 1.5;
        color: #333;
    }
    h1 {
        font-size: 24pt;
        color: #1a202c;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }
    h2 {
        font-size: 16pt;
        color: #2d3748;
        margin-top: 25px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 5px;
    }
    p {
        margin-bottom: 15px;
    }
    ul, ol {
        margin-bottom: 15px;
    }
    li {
        margin-bottom: 8px;
    }
    .header {
        text-align: right;
        font-size: 9pt;
        color: #718096;
        margin-bottom: 30px;
    }
    .footer {
        text-align: center;
        font-size: 9pt;
        color: #a0aec0;
        border-top: 1px solid #e2e8f0;
        padding-top: 5px;
    }
    strong {
        color: #1a202c;
    }
</style>
</head>
<body>
    <div id="footerContent" class="footer">
        Generado por Gestor de Flujo de Trabajo (IA) - Página <pdf:pagenumber> de <pdf:pagecount>
    </div>

    <div class="header">
        Generado el: {{ date_generated|date:"d/m/Y H:i" }}<br>
        Proyecto: {{ project.name }}
    </div>

    <h1>Resumen Ejecutivo</h1>
    
    <div class="content">
        {{ summary_html|safe }}
    </div>
</body>
</html>
